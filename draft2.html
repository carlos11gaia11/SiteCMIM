<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMIM Draft</title>

<script src="https://unpkg.com/vue@3"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:white;
margin:0;
color:#111;
}

header{
background:black;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:800;
}

header span{color:#FFD000;}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.teams{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.team{
border:3px solid #FFD000;
border-radius:16px;
padding:20px;
background:#fafafa;
}

.player{
padding:10px;
border-bottom:1px solid #eee;
font-weight:600;
display:flex;
justify-content:space-between;
}

.lane{
font-size:12px;
background:#FFD000;
padding:3px 8px;
border-radius:6px;
font-weight:800;
}

.voteBox{
margin-top:40px;
border:3px solid black;
padding:25px;
border-radius:12px;
}

button{
background:black;
color:white;
border:none;
padding:12px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

button.voted{
background:#27ae60;
}

.finishBtn{
background:#FFD000;
color:black;
font-weight:800;
}

</style>
</head>

<body>

<div id="app">

<header>
CMIM <span>Draft</span>
<div>Sala: {{draftId}}</div>
</header>

<div class="container">

<div class="teams">

<div class="team">
<h2>Time A</h2>

<div v-for="p in teamA" class="player">
<span>{{p.nick}}</span>
<span class="lane">{{p.lane}}</span>
</div>

</div>

<div class="team">
<h2>Time B</h2>

<div v-for="p in teamB" class="player">
<span>{{p.nick}}</span>
<span class="lane">{{p.lane}}</span>
</div>

</div>

</div>


<div class="voteBox">

<h2>Resultado</h2>

<button @click="voteResult('A')">Time A venceu</button>
<button @click="voteResult('B')">Time B venceu</button>

<br><br>

<button @click="voteScore('2-0')">2-0</button>
<button @click="voteScore('2-1')">2-1</button>

</div>


<div class="voteBox">

<h2>MVP</h2>

<button
v-for="p in allPlayers"
@click="voteMVP(p.nick)"
>
{{p.nick}}
</button>

</div>


<div class="voteBox">

<h2>Bagre</h2>

<button
v-for="p in allPlayers"
@click="voteBagre(p.nick)"
>
{{p.nick}}
</button>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyCM1zA9NYpxG9WSb8E4k91FNp2DIvqzPEQ",
authDomain:"login-cmim.firebaseapp.com",
projectId:"login-cmim"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)


const tierValues={
"S":12,"A+":11,"A":10,"A-":9,"B":8,"C":7,"D":6,"E":5,"F":4
}


function balanceByLane(players){

const lanes=["TOP","JUNGLE","MID","ADC","SUP"]

let teamA=[]
let teamB=[]

lanes.forEach(lane=>{

const lanePlayers=players
.filter(p=>p.lane===lane)
.sort((a,b)=>tierValues[b.tier]-tierValues[a.tier])

if(lanePlayers[0]) teamA.push(lanePlayers[0])
if(lanePlayers[1]) teamB.push(lanePlayers[1])

})

return{teamA,teamB}

}



const params=new URLSearchParams(window.location.search)

const draftId=params.get("draft")
const lolNick=params.get("nick")


Vue.createApp({

data(){
return{
draftId,
teamA:[],
teamB:[]
}
},

computed:{

allPlayers(){
return [...this.teamA,...this.teamB]
}

},

methods:{

async voteResult(team){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.exists()?snap.data():{}

if(data.resultVotes?.[lolNick]) return

if(!data.resultVotes) data.resultVotes={}

data.resultVotes[lolNick]=team

await setDoc(ref,data,{merge:true})

},

async voteScore(score){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.exists()?snap.data():{}

if(data.scoreVotes?.[lolNick]) return

if(!data.scoreVotes) data.scoreVotes={}

data.scoreVotes[lolNick]=score

await setDoc(ref,data,{merge:true})

},

async voteMVP(player){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.exists()?snap.data():{}

if(data.mvpVotes?.[lolNick]) return

if(!data.mvpVotes) data.mvpVotes={}

data.mvpVotes[lolNick]=player

await setDoc(ref,data,{merge:true})

},

async voteBagre(player){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.exists()?snap.data():{}

if(data.bagreVotes?.[lolNick]) return

if(!data.bagreVotes) data.bagreVotes={}

data.bagreVotes[lolNick]=player

await setDoc(ref,data,{merge:true})

}

},

mounted(){

const draftRef=doc(db,"drafts",draftId)

onSnapshot(draftRef,(snap)=>{

if(!snap.exists()) return

const players=snap.data().players||[]

if(players.length===10){

const {teamA,teamB}=balanceByLane(players)

this.teamA=teamA
this.teamB=teamB

}

})

}

}).mount("#app")

</script>

</body>
</html>
