<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMIM Draft</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:white;
margin:0;
color:#111;
}

header{
background:black;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:800;
}

header span{
color:#FFD000;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.teams{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.team{
border:3px solid #FFD000;
border-radius:16px;
padding:20px;
background:#fafafa;
}

.player{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.voteBox{
margin-top:40px;
border:3px solid black;
padding:25px;
border-radius:12px;
}

button{
background:black;
color:white;
border:none;
padding:12px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.8;
}

button.voted{
background:#27ae60;
}

.counter{
font-weight:700;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
CMIM <span>Draft</span>
<div id="roomInfo"></div>
</header>

<div class="container">

<div class="teams">

<div class="team">
<h2>Time A</h2>
<div id="teamA"></div>
</div>

<div class="team">
<h2>Time B</h2>
<div id="teamB"></div>
</div>

</div>

<div id="voteArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot,
updateDoc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCM1zA9NYpxG9WSb8E4k91FNp2DIvqzPEQ",
authDomain:"login-cmim.firebaseapp.com",
projectId:"login-cmim"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const params=new URLSearchParams(window.location.search)
const draftId=params.get("draft")

document.getElementById("roomInfo").innerText="Sala: "+draftId

/* pegar nick */

const lolNick=params.get("nick")

/* tiers */

const tierValues={
"S":12,"A+":11,"A":10,"A-":9,"B":8,"C":7,"D":6,"E":5,"F":4
}

/* balanceamento */

function balanceTeams(players){

players.sort((a,b)=>tierValues[b.tier]-tierValues[a.tier])

const teamA=[]
const teamB=[]

players.forEach((p,i)=>{

if(i%4===0||i%4===3){
teamA.push(p)
}else{
teamB.push(p)
}

})

return{teamA,teamB}

}

/* render */

function render(teamA,teamB){

const divA=document.getElementById("teamA")
const divB=document.getElementById("teamB")

divA.innerHTML=""
divB.innerHTML=""

teamA.forEach(p=>{
divA.innerHTML+=`<div class="player">${p.nick}</div>`
})

teamB.forEach(p=>{
divB.innerHTML+=`<div class="player">${p.nick}</div>`
})

renderResultVote(teamA,teamB)

}

/* ================= RESULTADO ================= */

async function renderResultVote(teamA,teamB){

document.getElementById("voteArea").innerHTML=`

<div class="voteBox">

<h2>Resultado</h2>

<div id="resultCount" class="counter">0 / 5 votos</div>

<button onclick="voteResult('A',this)">Time A venceu</button>
<button onclick="voteResult('B',this)">Time B venceu</button>

</div>

`

}

window.voteResult=async function(team,btn){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.exists()?snap.data():{resultVotes:{}}

if(data.resultVotes[lolNick]) return

data.resultVotes[lolNick]=team

await setDoc(ref,data)

btn.classList.add("voted")

updateResultVotes()

}

async function updateResultVotes(){

const snap=await getDoc(doc(db,"votes",draftId))

if(!snap.exists()) return

const votes=snap.data().resultVotes||{}

const total=Object.keys(votes).length

document.getElementById("resultCount").innerText=total+" / 5 votos"

if(total>=5){

const counts={}

Object.values(votes).forEach(v=>{
counts[v]=(counts[v]||0)+1
})

window.winner=Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b)

renderMVP()

}

}

/* ================= MVP ================= */

async function renderMVP(){

document.getElementById("voteArea").innerHTML=`

<div class="voteBox">

<h2>Vote no MVP</h2>

<div id="mvpCount" class="counter">0 / 5 votos</div>

</div>

`

}

window.voteMVP=async function(player,btn){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.data()

if(data.mvpVotes?.[lolNick]) return

if(!data.mvpVotes) data.mvpVotes={}

data.mvpVotes[lolNick]=player

await setDoc(ref,data)

btn.classList.add("voted")

updateMVPVotes()

}

async function updateMVPVotes(){

const snap=await getDoc(doc(db,"votes",draftId))

const votes=snap.data().mvpVotes||{}

const total=Object.keys(votes).length

document.getElementById("mvpCount").innerText=total+" / 5 votos"

if(total>=5){

const counts={}

Object.values(votes).forEach(v=>{
counts[v]=(counts[v]||0)+1
})

window.mvp=Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b)

renderBagre()

}

}

/* ================= BAGRE ================= */

async function renderBagre(){

document.getElementById("voteArea").innerHTML=`

<div class="voteBox">

<h2>Vote no Bagre</h2>

<div id="bagreCount" class="counter">0 / 5 votos</div>

</div>

`

}

window.voteBagre=async function(player,btn){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.data()

if(data.bagreVotes?.[lolNick]) return

if(!data.bagreVotes) data.bagreVotes={}

data.bagreVotes[lolNick]=player

await setDoc(ref,data)

btn.classList.add("voted")

updateBagreVotes()

}

async function updateBagreVotes(){

const snap=await getDoc(doc(db,"votes",draftId))

const votes=snap.data().bagreVotes||{}

const total=Object.keys(votes).length

document.getElementById("bagreCount").innerText=total+" / 5 votos"

if(total>=5){

const counts={}

Object.values(votes).forEach(v=>{
counts[v]=(counts[v]||0)+1
})

window.bagre=Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b)

showFinish()

}

}

/* FINAL */

function showFinish(){

document.getElementById("voteArea").innerHTML=`

<div class="voteBox">

<h2>Resultado Final</h2>

<p>MVP: <b>${window.mvp}</b></p>
<p>Bagre: <b>${window.bagre}</b></p>

<button onclick="finishQueue()">Finalizar Queue</button>

</div>

`

}

window.finishQueue=async function(){

await updateDoc(doc(db,"queue","players"),{
list:[]
})

window.location.href="menu.html"

}

/* listener */

const draftRef=doc(db,"drafts",draftId)

onSnapshot(draftRef,(snap)=>{

if(!snap.exists()) return

const players=snap.data().players||[]

if(players.length===10){

const{teamA,teamB}=balanceTeams(players)

render(teamA,teamB)

}

})

</script>

</body>
</html>
