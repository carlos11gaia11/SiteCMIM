<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMIM Draft</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:white;
margin:0;
color:#111;
}

header{
background:black;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:800;
}

header span{
color:#FFD000;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.teams{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.team{
border:3px solid #FFD000;
border-radius:16px;
padding:20px;
background:#fafafa;
}

.player{
padding:10px;
border-bottom:1px solid #eee;
font-weight:600;
}

.voteBox{
margin-top:40px;
border:3px solid black;
padding:25px;
border-radius:12px;
}

button{
background:black;
color:white;
border:none;
padding:12px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
transition:.2s;
font-weight:700;
}

button:hover{
opacity:.8;
}

button.voted{
background:#27ae60;
}

.finishBtn{
background:#FFD000;
color:black;
font-weight:800;
}

</style>
</head>

<body>

<header>
CMIM <span>Draft</span>
<div id="roomInfo"></div>
</header>

<div class="container">

<div class="teams">

<div class="team">
<h2>Time A</h2>
<div id="teamA"></div>
</div>

<div class="team">
<h2>Time B</h2>
<div id="teamB"></div>
</div>

</div>

<div id="voteArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot,
updateDoc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCM1zA9NYpxG9WSb8E4k91FNp2DIvqzPEQ",
authDomain:"login-cmim.firebaseapp.com",
projectId:"login-cmim"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const params=new URLSearchParams(window.location.search)

const draftId=params.get("draft")
const lolNick=params.get("nick")

document.getElementById("roomInfo").innerText="Sala: "+draftId

let teamA=[]
let teamB=[]
let winnerTeam=[]
let loserTeam=[]


/* TIERS */

const tierValues={
"S":12,"A+":11,"A":10,"A-":9,"B":8,"C":7,"D":6,"E":5,"F":4
}


/* BALANCEAMENTO */

function balanceTeams(players){

players.sort((a,b)=>tierValues[b.tier]-tierValues[a.tier])

const A=[]
const B=[]

players.forEach((p,i)=>{

if(i%4===0||i%4===3){
A.push(p)
}else{
B.push(p)
}

})

return{teamA:A,teamB:B}

}


/* RENDER TIMES */

function render(A,B){

teamA=A
teamB=B

const divA=document.getElementById("teamA")
const divB=document.getElementById("teamB")

divA.innerHTML=""
divB.innerHTML=""

teamA.forEach(p=>{
divA.innerHTML+=`<div class="player">${p.nick}</div>`
})

teamB.forEach(p=>{
divB.innerHTML+=`<div class="player">${p.nick}</div>`
})

renderResultVote()

}


/* RESULTADO */

function renderResultVote(){

document.getElementById("voteArea").innerHTML=`

<div class="voteBox">

<h2>Resultado da Série</h2>

<button id="btnA">Time A venceu</button>
<button id="btnB">Time B venceu</button>

<br><br>

<button id="btn20">2-0</button>
<button id="btn21">2-1</button>

</div>

`

document.getElementById("btnA").onclick=()=>voteResult("A")
document.getElementById("btnB").onclick=()=>voteResult("B")
document.getElementById("btn20").onclick=()=>voteScore("2-0")
document.getElementById("btn21").onclick=()=>voteScore("2-1")

}


async function voteResult(team){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.exists()?snap.data():{}

if(!data.resultVotes) data.resultVotes={}
if(data.resultVotes[lolNick]) return

data.resultVotes[lolNick]=team

await setDoc(ref,data)

winnerTeam = team==="A"?teamA:teamB
loserTeam = team==="A"?teamB:teamA

renderMVP()

}


async function voteScore(score){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.exists()?snap.data():{}

if(!data.scoreVotes) data.scoreVotes={}
if(data.scoreVotes[lolNick]) return

data.scoreVotes[lolNick]=score

await setDoc(ref,data)

}


/* MVP */

function renderMVP(){

let html=`<div class="voteBox"><h2>Vote no MVP</h2>`

winnerTeam.forEach(p=>{

html+=`<button class="mvpBtn">${p.nick}</button>`

})

html+=`</div>`

document.getElementById("voteArea").innerHTML=html

document.querySelectorAll(".mvpBtn").forEach(btn=>{

btn.onclick=()=>voteMVP(btn.innerText)

})

}


async function voteMVP(player){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.data()

if(!data.mvpVotes) data.mvpVotes={}
if(data.mvpVotes[lolNick]) return

data.mvpVotes[lolNick]=player

await setDoc(ref,data)

renderBagre()

}


/* BAGRE */

function renderBagre(){

let html=`<div class="voteBox"><h2>Vote no Bagre</h2>`

loserTeam.forEach(p=>{

html+=`<button class="bagreBtn">${p.nick}</button>`

})

html+=`</div>`

document.getElementById("voteArea").innerHTML=html

document.querySelectorAll(".bagreBtn").forEach(btn=>{

btn.onclick=()=>voteBagre(btn.innerText)

})

}


async function voteBagre(player){

const ref=doc(db,"votes",draftId)

const snap=await getDoc(ref)

let data=snap.data()

if(!data.bagreVotes) data.bagreVotes={}
if(data.bagreVotes[lolNick]) return

data.bagreVotes[lolNick]=player

await setDoc(ref,data)

showFinishButton()

}


/* BOTÃO FINAL */

function showFinishButton(){

document.getElementById("voteArea").innerHTML=`

<div class="voteBox">

<h2>Votação concluída</h2>

<button id="finishBtn" class="finishBtn">
Voltar ao Menu
</button>

</div>

`

document.getElementById("finishBtn").onclick=finishQueue

}


async function finishQueue(){

try{

await updateDoc(doc(db,"queue","players"),{
list:[]
})

window.location.href="menu.html"

}catch(e){

console.error(e)
alert("Erro ao finalizar")

}

}


/* LISTENER */

const draftRef=doc(db,"drafts",draftId)

onSnapshot(draftRef,(snap)=>{

if(!snap.exists()) return

const players=snap.data().players||[]

if(players.length===10){

const{teamA:A,teamB:B}=balanceTeams(players)

render(A,B)

}

})

</script>

</body>
</html>
