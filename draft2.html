<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMIM Draft</title>

<script src="https://unpkg.com/vue@3"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:white;
margin:0;
color:#111;
}

header{
background:black;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:800;
}

header span{color:#FFD000;}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.teams{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.team{
border:3px solid #FFD000;
border-radius:16px;
padding:20px;
background:#fafafa;
}

.player{
padding:10px;
border-bottom:1px solid #eee;
font-weight:600;
display:flex;
justify-content:space-between;
}

.lane{
font-size:12px;
background:#FFD000;
padding:3px 8px;
border-radius:6px;
font-weight:800;
}

.voteBox{
margin-top:40px;
border:3px solid black;
padding:25px;
border-radius:12px;
}

button{
background:black;
color:white;
border:none;
padding:12px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

button.voted{
background:#27ae60;
}

.menuBtn{
background:#FFD000;
color:black;
font-weight:800;
}

</style>
</head>

<body>

<div id="app">

<header>
CMIM <span>Draft</span>
<div>Sala: {{draftId}}</div>
</header>

<div class="container">

<div class="teams">

<div class="team">
<h2>Time A</h2>

<div v-for="p in teamA" :key="p.nick" class="player">
<span>{{p.nick}}</span>
<span class="lane">{{p.lane}}</span>
</div>

</div>

<div class="team">
<h2>Time B</h2>

<div v-for="p in teamB" :key="p.nick" class="player">
<span>{{p.nick}}</span>
<span class="lane">{{p.lane}}</span>
</div>

</div>

</div>


<div class="voteBox">

<h2>Resultado</h2>

<button
@click="voteResult('A')"
:class="{voted:voted.result==='A'}"
>
Time A venceu ({{votes.result.A}})
</button>

<button
@click="voteResult('B')"
:class="{voted:voted.result==='B'}"
>
Time B venceu ({{votes.result.B}})
</button>

<br><br>

<button
@click="voteScore('2-0')"
:class="{voted:voted.score==='2-0'}"
>
2-0 ({{votes.score['2-0']}})
</button>

<button
@click="voteScore('2-1')"
:class="{voted:voted.score==='2-1'}"
>
2-1 ({{votes.score['2-1']}})
</button>

</div>


<div class="voteBox">

<h2>MVP</h2>

<button
v-for="p in allPlayers"
:key="p.nick"
@click="voteMVP(p.nick)"
:class="{voted:voted.mvp===p.nick}"
>
{{p.nick}} ({{votes.mvp[p.nick] || 0}})
</button>

</div>


<div class="voteBox">

<h2>Bagre</h2>

<button
v-for="p in allPlayers"
:key="p.nick"
@click="voteBagre(p.nick)"
:class="{voted:voted.bagre===p.nick}"
>
{{p.nick}} ({{votes.bagre[p.nick] || 0}})
</button>

</div>


<div class="voteBox">

<h2>Resultados da Comunidade</h2>

<p v-if="winner.result">
Vencedor da série: <b>Time {{winner.result}}</b>
</p>

<p v-if="winner.score">
Placar mais votado: <b>{{winner.score}}</b>
</p>

<p v-if="winner.mvp">
MVP da série: <b>{{winner.mvp}}</b>
</p>

<p v-if="winner.bagre">
Bagre da série: <b>{{winner.bagre}}</b>
</p>

</div>


<div
v-if="voted.result && voted.score && voted.mvp && voted.bagre"
class="voteBox"
>

<button class="menuBtn" @click="goMenu">
Voltar ao Menu Principal
</button>

</div>


</div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCM1zA9NYpxG9WSb8E4k91FNp2DIvqzPEQ",
authDomain:"login-cmim.firebaseapp.com",
projectId:"login-cmim"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)


const tierValues={
"S":12,"A+":11,"A":10,"A-":9,"B":8,"C":7,"D":6,"E":5,"F":4
}


function balanceByLane(players){

const lanes=["top","jg","mid","adc","sup"]

let teamA=[]
let teamB=[]

lanes.forEach(lane=>{

const lanePlayers=players
.filter(p => (p.lane || "").toLowerCase().includes(lane))
.sort((a,b)=>tierValues[b.tier]-tierValues[a.tier])

if(lanePlayers[0]) teamA.push(lanePlayers[0])
if(lanePlayers[1]) teamB.push(lanePlayers[1])

})

return{teamA,teamB}

}


const params=new URLSearchParams(window.location.search)

const draftId=params.get("draft")
const lolNick=params.get("nick")


Vue.createApp({

data(){
return{

draftId,

teamA:[],
teamB:[],

voted:{
result:null,
score:null,
mvp:null,
bagre:null
},

votes:{
result:{A:0,B:0},
score:{"2-0":0,"2-1":0},
mvp:{},
bagre:{}
},

winner:{
result:null,
score:null,
mvp:null,
bagre:null
}

}
},

computed:{
allPlayers(){
return [...this.teamA,...this.teamB]
}
},

methods:{


async voteResult(team){

if(this.voted.result) return

await setDoc(doc(db,"votes",draftId),{
resultVotes:{[lolNick]:team}
},{merge:true})

this.voted.result=team

},

async voteScore(score){

if(this.voted.score) return

await setDoc(doc(db,"votes",draftId),{
scoreVotes:{[lolNick]:score}
},{merge:true})

this.voted.score=score

},

async voteMVP(player){

if(this.voted.mvp) return

await setDoc(doc(db,"votes",draftId),{
mvpVotes:{[lolNick]:player}
},{merge:true})

this.voted.mvp=player

},

async voteBagre(player){

if(this.voted.bagre) return

await setDoc(doc(db,"votes",draftId),{
bagreVotes:{[lolNick]:player}
},{merge:true})

this.voted.bagre=player

},

goMenu(){
window.location.href="menu.html"
}

},


mounted(){

const draftRef=doc(db,"drafts",draftId)

onSnapshot(draftRef,(snap)=>{

if(!snap.exists()) return

const players=snap.data().players||[]

if(players.length===10){

const {teamA,teamB}=balanceByLane(players)

this.teamA=teamA
this.teamB=teamB

}

})


const votesRef=doc(db,"votes",draftId)

onSnapshot(votesRef,(snap)=>{

if(!snap.exists()) return

const data=snap.data()

this.votes.result={A:0,B:0}
this.votes.score={"2-0":0,"2-1":0}
this.votes.mvp={}
this.votes.bagre={}

if(data.resultVotes){

Object.values(data.resultVotes).forEach(v=>{
this.votes.result[v]++
})

}

if(data.scoreVotes){

Object.values(data.scoreVotes).forEach(v=>{
this.votes.score[v]++
})

}

if(data.mvpVotes){

Object.values(data.mvpVotes).forEach(p=>{
if(!this.votes.mvp[p]) this.votes.mvp[p]=0
this.votes.mvp[p]++
})

}

if(data.bagreVotes){

Object.values(data.bagreVotes).forEach(p=>{
if(!this.votes.bagre[p]) this.votes.bagre[p]=0
this.votes.bagre[p]++
})

}

this.winner.result =
this.votes.result.A > this.votes.result.B ? "A" : "B"

this.winner.score =
this.votes.score["2-0"] > this.votes.score["2-1"] ? "2-0" : "2-1"

this.winner.mvp = Object.keys(this.votes.mvp)
.sort((a,b)=>this.votes.mvp[b]-this.votes.mvp[a])[0]

this.winner.bagre = Object.keys(this.votes.bagre)
.sort((a,b)=>this.votes.bagre[b]-this.votes.bagre[a])[0]

})

}

}).mount("#app")

</script>

</body>
</html>
