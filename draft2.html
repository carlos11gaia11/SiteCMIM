<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMIM Draft</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:white;
margin:0;
color:#111;
}

header{
background:black;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:800;
letter-spacing:1px;
}

header span{
color:#FFD000;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.title{
font-size:32px;
font-weight:800;
margin-bottom:30px;
}

.teams{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.team{
border:3px solid #FFD000;
border-radius:16px;
padding:20px;
background:#fafafa;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.team h2{
margin-top:0;
font-size:22px;
border-bottom:2px solid #FFD000;
padding-bottom:8px;
}

.player{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
border:1px solid #eee;
padding:10px 12px;
border-radius:8px;
margin-bottom:8px;
font-weight:600;
}

.lane{
font-size:12px;
color:#666;
}

.tier{
font-weight:800;
color:#FFD000;
}

.voteBox{
margin-top:40px;
border:3px solid black;
padding:25px;
border-radius:12px;
}

button{
background:black;
color:white;
border:none;
padding:12px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

button:hover{
opacity:.85;
}

</style>
</head>

<body>

<header>
CMIM <span>Draft</span>
<div id="roomInfo">Sala</div>
</header>

<div class="container">

<div class="title">Times Balanceados</div>

<div class="teams">

<div class="team">
<h2>Time A</h2>
<div id="teamA"></div>
</div>

<div class="team">
<h2>Time B</h2>
<div id="teamB"></div>
</div>

</div>

<div id="voteArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot,
updateDoc,
setDoc,
collection
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCM1zA9NYpxG9WSb8E4k91FNp2DIvqzPEQ",
authDomain:"login-cmim.firebaseapp.com",
projectId:"login-cmim"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const draftId = params.get("draft");

document.getElementById("roomInfo").innerText="Sala: "+draftId;

/* VALOR TIERS */

const tierValues={
"S":12,
"A+":11,
"A":10,
"A-":9,
"B":8,
"C":7,
"D":6,
"E":5,
"F":4
};

/* BALANCEAMENTO SNAKE */

function balanceTeams(players){

players.sort((a,b)=>tierValues[b.tier]-tierValues[a.tier]);

const teamA=[];
const teamB=[];

players.forEach((p,i)=>{

if(i%4===0 || i%4===3){
teamA.push(p);
}else{
teamB.push(p);
}

});

return {teamA,teamB};

}

/* RENDER TIMES */

function render(teamA,teamB){

const divA=document.getElementById("teamA");
const divB=document.getElementById("teamB");

divA.innerHTML="";
divB.innerHTML="";

teamA.forEach(p=>{

divA.innerHTML+=`
<div class="player">
<div>
${p.nick}
<div class="lane">${p.lane}</div>
</div>
<div class="tier">${p.tier}</div>
</div>
`;

});

teamB.forEach(p=>{

divB.innerHTML+=`
<div class="player">
<div>
${p.nick}
<div class="lane">${p.lane}</div>
</div>
<div class="tier">${p.tier}</div>
</div>
`;

});

renderVote(teamA,teamB)

}

/* RESULTADO */

function renderVote(teamA,teamB){

const voteArea=document.getElementById("voteArea");

voteArea.innerHTML=`

<div class="voteBox">

<h2>Resultado da Série</h2>

<button onclick="voteWinner('A')">Time A venceu</button>
<button onclick="voteWinner('B')">Time B venceu</button>

<br><br>

<button onclick="voteScore('2-0')">2-0</button>
<button onclick="voteScore('2-1')">2-1</button>

</div>

`

window.voteWinner=(team)=>{

window.winner=team

renderMVP(teamA,teamB)

}

window.voteScore=(score)=>{

window.score=score

}

}

/* SISTEMA DE VOTAÇÃO */

let voteCount=0
let mvpVotes={}
let bagreVotes={}

let winnerTeam=[]
let loserTeam=[]

function renderMVP(teamA,teamB){

winnerTeam = window.winner==="A" ? teamA : teamB
loserTeam = window.winner==="A" ? teamB : teamA

let html=`

<div class="voteBox">

<h2>Vote no MVP</h2>

<p id="voteCount">Votos: 0 / 5</p>

`

winnerTeam.forEach(p=>{

html+=`<button onclick="voteMVP('${p.nick}')">${p.nick}</button>`

})

html+=`<h2>Vote no Bagre</h2>`

loserTeam.forEach(p=>{

html+=`<button onclick="voteBagre('${p.nick}')">${p.nick}</button>`

})

html+=`<div id="resultArea"></div>`

html+=`</div>`

document.getElementById("voteArea").innerHTML=html

}

window.voteMVP=(nick)=>{

if(!mvpVotes[nick]) mvpVotes[nick]=0
mvpVotes[nick]++

checkVote()

}

window.voteBagre=(nick)=>{

if(!bagreVotes[nick]) bagreVotes[nick]=0
bagreVotes[nick]++

checkVote()

}

function checkVote(){

voteCount++

document.getElementById("voteCount").innerText="Votos: "+voteCount+" / 5"

if(voteCount>=5){

calculateResult()

}

}

function calculateResult(){

let mvp = Object.keys(mvpVotes).reduce((a,b)=>mvpVotes[a]>mvpVotes[b]?a:b)

let bagre = Object.keys(bagreVotes).reduce((a,b)=>bagreVotes[a]>bagreVotes[b]?a:b)

window.mvp=mvp
window.bagre=bagre

let html=`

<h2>Resultado da votação</h2>

<p><b>MVP:</b> ${mvp}</p>

<p><b>Bagre:</b> ${bagre}</p>

<br>

<button onclick="finishQueue()">Finalizar Queue</button>

`

document.getElementById("resultArea").innerHTML=html

}

/* FINALIZAR */

window.finishQueue = async function(){

await setDoc(doc(collection(db,"results")),{

draft:draftId,
winner:window.winner,
score:window.score,
mvp:window.mvp,
bagre:window.bagre,
time:Date.now()

})

await updateDoc(doc(db,"queue","players"),{

list:[]

})

alert("Partida registrada!")

window.location.href="menu.html"

}

/* ESCUTAR DRAFT */

const draftRef = doc(db,"drafts",draftId)

onSnapshot(draftRef,(snap)=>{

if(!snap.exists()) return

const players = snap.data().players || []

if(players.length===10){

const {teamA,teamB}=balanceTeams(players)

render(teamA,teamB)

}

})

</script>

</body>
</html>
