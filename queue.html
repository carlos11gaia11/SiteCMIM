<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMIM Queue</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#f4f6f8}

.navbar{
background:#111;
color:#fff;
padding:16px 32px;
display:flex;
justify-content:space-between
}

.main{
padding:40px;
max-width:1100px;
margin:auto
}

.queue{
background:#fff;
border-radius:16px;
padding:24px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08)
}

.adminScheduler{
background:#fff;
border-radius:12px;
padding:20px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08)
}

button{
background:#111;
color:#fff;
font-weight:600;
cursor:pointer;
border:none;
padding:8px 14px;
border-radius:8px
}

input,select{
padding:8px;
border-radius:8px;
border:1px solid #d1d5db
}

</style>
</head>

<body>

<div class="navbar">
<h1>CMIM Queue</h1>
<div id="userInfo">Carregando...</div>
</div>

<div class="main">

<div id="adminScheduler"></div>

<button id="btnCriarFila" style="display:none;margin-bottom:20px">
➕ Criar Nova Fila
</button>

<div id="listaFilas"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getFirestore,
collection,
doc,
getDoc,
setDoc,
updateDoc,
onSnapshot,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { 
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
apiKey:"AIzaSyCM1zA9NYpxG9WSb8E4k91FNp2DIvqzPEQ",
authDomain:"login-cmim.firebaseapp.com",
projectId:"login-cmim"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser;
let profile;
let isAdmin=false;


/* LOGIN */

onAuthStateChanged(auth, async user=>{

if(!user){
location.href="login.html";
return;
}

currentUser=user;

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()){
alert("Perfil não encontrado");
return;
}

profile=snap.data();

isAdmin = profile.role === "admin";

document.getElementById("userInfo").innerText =
`Logado como ${profile.lolNick}`;


/* ADMIN */

if(isAdmin){

document.getElementById("btnCriarFila").style.display="block";

document.getElementById("btnCriarFila").onclick = criarFila;

document.getElementById("adminScheduler").innerHTML=`

<div class="adminScheduler">

<h3>Programar fila automática</h3>

<input type="time" id="horaFila">

<select id="formatoFila">
<option>MD1</option>
<option>MD3</option>
<option>MD5</option>
</select>

<button id="btnAgendar">Agendar Fila</button>

</div>

`;

document.getElementById("btnAgendar").onclick = agendarFila;

}

carregarFilas();

setInterval(verificarFilasAgendadas,60000);

});


/* CRIAR FILA */

async function criarFila(){

await addDoc(collection(db,"queues"),{

horario:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),

formato:"MD3",
status:"aberta",

lanes:{
top:[],
jg:[],
mid:[],
adc:[],
sup:[]
},

overflow:[],
ready:{}

});

alert("Fila criada!");

}


/* AGENDAR FILA */

async function agendarFila(){

const hora=document.getElementById("horaFila").value;
const formato=document.getElementById("formatoFila").value;

if(!hora){
alert("Escolha um horário");
return;
}

await addDoc(collection(db,"scheduledQueues"),{

horario:hora,
formato:formato,
ativo:true,
executadoHoje:null

});

alert("Fila programada!");

}


/* VERIFICAR FILAS AGENDADAS */

async function verificarFilasAgendadas(){

const agora=new Date();

const horaAtual=agora.toTimeString().slice(0,5);
const hoje=agora.toISOString().slice(0,10);

const snap=await getDocs(collection(db,"scheduledQueues"));

snap.forEach(async fila=>{

const data=fila.data();

if(!data.ativo) return;

if(data.horario===horaAtual && data.executadoHoje!==hoje){

await addDoc(collection(db,"queues"),{

horario:data.horario,
formato:data.formato,
status:"aberta",

lanes:{
top:[],
jg:[],
mid:[],
adc:[],
sup:[]
},

overflow:[],
ready:{}

});

await updateDoc(doc(db,"scheduledQueues",fila.id),{
executadoHoje:hoje
});

}

});

}


/* LISTAR FILAS */

function carregarFilas(){

const q = collection(db,"queues");

onSnapshot(q,snap=>{

const div=document.getElementById("listaFilas");
div.innerHTML="";

snap.docs.forEach(d=>{

const data=d.data();

const box=document.createElement("div");
box.className="queue";

box.innerHTML=`

<h3>Fila ${data.formato}</h3>

<p>Horário: ${data.horario}</p>

<p>Status: ${data.status}</p>

`;

div.appendChild(box);

});

});

}

</script>

</body>
</html>
