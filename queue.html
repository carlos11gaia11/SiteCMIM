<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMIM Queue</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{background:#f4f6f8}

.navbar{
background:#111;
color:#fff;
padding:16px 32px;
display:flex;
justify-content:space-between
}

.main{
padding:40px;
max-width:1100px;
margin:auto
}

.queue{
background:#fff;
border-radius:16px;
padding:24px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
position:relative
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:16px
}

.badge{
padding:6px 12px;
border-radius:999px;
font-size:12px;
font-weight:600
}

.md{background:#eef2ff;color:#4338ca}
.time{background:#e6f9f0;color:#0f9d58}

.lanes{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-bottom:16px
}

.lane{
background:#f9fafb;
border-radius:12px;
padding:10px;
border:1px solid #e5e7eb
}

.lane h3{
text-align:center;
font-size:13px;
margin-bottom:6px
}

.removeBtn{
background:#ef4444;
border:none;
color:#fff;
font-size:11px;
padding:2px 6px;
border-radius:6px;
cursor:pointer;
line-height:1;
}

.slot{
background:#fff;
border:1px dashed #d1d5db;
border-radius:8px;
padding:5px;
font-size:12px;
margin-bottom:4px;
display:flex;
justify-content:space-between
}

.overflow{
background:#fffbeb;
border:1px solid #fde68a;
border-radius:12px;
padding:10px;
font-size:13px
}

.form{
margin-top:12px;
display:flex;
gap:10px
}

select,button,input{
padding:8px;
border-radius:8px;
border:1px solid #d1d5db
}

button{
background:#111;
color:#fff;
font-weight:600;
cursor:pointer
}

.readyBox{
margin-top:15px;
text-align:center;
font-weight:600
}

.adminScheduler{
background:#fff;
border-radius:12px;
padding:20px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08)
}

</style>
</head>

<body>

<div class="navbar">
<h1>CMIM Queue</h1>
<div id="userInfo">Carregando...</div>
</div>

<div class="main">

<div id="adminScheduler"></div>

<button id="btnCriarFila" style="display:none;margin-bottom:20px" onclick="criarFila()">
➕ Criar Nova Fila
</button>

<div id="listaFilas"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, onSnapshot, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCM1zA9NYpxG9WSb8E4k91FNp2DIvqzPEQ",
authDomain:"login-cmim.firebaseapp.com",
projectId:"login-cmim"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser;
let profile;
let isAdmin=false;
let redirecting=false;

onAuthStateChanged(auth, async user=>{

if(!user){
location.href="login.html";
return;
}

currentUser=user;

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()){
alert("Perfil não encontrado");
return;
}

profile=snap.data();

isAdmin = profile.role === "admin";

document.getElementById("userInfo").innerText=
`Logado como ${profile.lolNick}`;

if(isAdmin){

document.getElementById("btnCriarFila").style.display="block";

document.getElementById("adminScheduler").innerHTML=`

<div class="adminScheduler">

<h3>Programar fila automática</h3>

<input type="time" id="horaFila">

<select id="formatoFila">
<option>MD1</option>
<option>MD3</option>
<option>MD5</option>
</select>

<button onclick="agendarFila()">Agendar Fila</button>

</div>

`;

}

carregarFilas();

});

function carregarFilas(){

const q = collection(db,"queues");

onSnapshot(q,snap=>{

const div=document.getElementById("listaFilas");
div.innerHTML="";

snap.docs.forEach(d=>{
renderFila(d.id,d.data(),div)
})

})

}

function renderFila(id,data,container){

if(data.status==="draft" && data.draftId){

const players = Object.values(data.lanes).flat();

if(players.some(p=>p.uid===currentUser.uid) && !redirecting){
redirecting=true;
window.location.href=`draft2.html?draft=${data.draftId}`;
}

}

const div=document.createElement("div");
div.className="queue";

const totalPlayers =
Object.values(data.lanes).flat().length;

const readyCount =
data.ready ? Object.keys(data.ready).length : 0;

div.innerHTML=`...` /* mantive exatamente sua estrutura */

container.appendChild(div);

}

/* AGENDAR FILA */

window.agendarFila=async()=>{

const hora=document.getElementById("horaFila").value;
const formato=document.getElementById("formatoFila").value;

if(!hora)return alert("Escolha um horário");

await addDoc(collection(db,"scheduledQueues"),{

horario:hora,
formato:formato,
ativo:true,
executadoHoje:null

});

alert("Fila programada!");

};

/* VERIFICAR FILAS AUTOMATICAS */

setInterval(verificarFilasAgendadas,60000);

async function verificarFilasAgendadas(){

const agora=new Date();

const horaAtual=agora.toTimeString().slice(0,5);
const hoje=agora.toISOString().slice(0,10);

const snap=await getDocs(collection(db,"scheduledQueues"));

snap.forEach(async docu=>{

const data=docu.data();

if(!data.ativo)return;

if(data.horario===horaAtual && data.executadoHoje!==hoje){

await setDoc(doc(collection(db,"queues")),{

horario:data.horario,
formato:data.formato,
status:"aberta",

lanes:{
top:[],
jg:[],
mid:[],
adc:[],
sup:[]
},

overflow:[],
ready:{}

});

await updateDoc(doc(db,"scheduledQueues",docu.id),{
executadoHoje:hoje
});

}

});

}

</script>

</body>
</html>
